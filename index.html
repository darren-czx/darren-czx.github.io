<!DOCTYPE html>
<html>

<head>
  <title>Darren Cheng</title>

  <style>
    body {
      font-family: Georgia, serif;
      max-width: 650px;
      margin: auto;
      padding: 40px;
      line-height: 1.6;
    }

    h1 {
      font-size: 32px;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>
<canvas id="bg"></canvas>
<h1>Darren Cheng</h1>

<p>Student interested in biology, business and technology.</p>

<h3>Currently</h3>
<ul>
<li></li>
<li></li>
</ul>

</body>
</html>
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>
